<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900">
  <!-- Grayscale Background -->
  <rect width="100%" height="100%" fill="#f8fafc" />
  
  <!-- WIREFRAME NAVBAR -->
  <rect x="0" y="0" width="1440" height="70" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
  <rect x="60" y="15" width="40" height="40" rx="8" fill="#e2e8f0" stroke="#94a3b8" />
  <text x="73" y="40" font-family="system-ui, sans-serif" font-size="16" font-weight="900" fill="#475569">[L]</text>
  <text x="120" y="38" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#334155">SentiNest [Branding]</text>
  <text x="120" y="52" font-family="system-ui, sans-serif" font-size="10" font-weight="semibold" fill="#64748b">[Trishul Homestays]</text>
  
  <!-- Navbar links -->
  <text x="480" y="42" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#64748b">[Link: Home]</text>
  <text x="580" y="42" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#64748b">[Link: Classifier]</text>
  <text x="720" y="42" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#64748b">[Link: About]</text>
  <text x="840" y="42" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#64748b">[Link: Dashboard]</text>
  <text x="1000" y="42" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#334155">[Link: Login]</text>
  
  <rect x="1240" y="18" width="140" height="34" rx="8" fill="#e2e8f0" stroke="#cbd5e1" />
  <text x="1275" y="39" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#475569">[Staff Portal]</text>
  
  <!-- LOGIN CONTAINER CARD -->
  <rect x="470" y="140" width="500" height="580" rx="28" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
  
  <!-- Form Header -->
  <rect x="700" y="180" width="40" height="40" rx="8" fill="#e2e8f0" stroke="#94a3b8" />
  <!-- crossed diagonal for form icon -->
  <line x1="700" y1="180" x2="740" y2="220" stroke="#94a3b8" />
  <line x1="740" y1="180" x2="700" y2="220" stroke="#94a3b8" />
  
  <text x="720" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="950" fill="#334155">[Staff Authentication]</text>
  <text x="720" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">[Access the homestay review sentiment auditing portal]</text>

  <!-- FORM FIELDS -->
  <!-- Field 1: Email -->
  <text x="510" y="335" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#475569">[EMAIL ADDRESS INPUT LABEL]</text>
  <rect x="510" y="350" width="420" height="44" rx="10" fill="#f8fafc" stroke="#cbd5e1" />
  <text x="530" y="377" font-family="system-ui, sans-serif" font-size="13" font-style="italic" fill="#94a3b8">[Input placeholder: staff@trishulecohomestays.com]</text>

  <!-- Field 2: Password -->
  <text x="510" y="435" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#475569">[PASSWORD INPUT LABEL]</text>
  <rect x="510" y="450" width="420" height="44" rx="10" fill="#f8fafc" stroke="#cbd5e1" />
  <text x="530" y="477" font-family="system-ui, sans-serif" font-size="13" font-style="italic" fill="#94a3b8">[Input placeholder: ••••••••••••]</text>

  <!-- Field 3: Confirm Password (for Signup layout) -->
  <text x="510" y="535" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#94a3b8">[OPTIONAL: CONFIRM PASSWORD (SIGNUP ONLY)]</text>
  <rect x="510" y="550" width="420" height="44" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-dasharray="4 4" />
  <text x="530" y="577" font-family="system-ui, sans-serif" font-size="13" font-style="italic" fill="#94a3b8">[Hidden placeholder state]</text>

  <!-- Submit button -->
  <rect x="510" y="620" width="420" height="48" rx="12" fill="#334155" stroke="#1e293b" />
  <text x="720" y="649" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">[Button: Submit Form Credentials]</text>

  <!-- Switch layout Link -->
  <text x="720" y="695" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#475569">[Switch form toggle: Don't have an account? Sign Up]</text>

  <!-- WIREFRAME FOOTER -->
  <rect x="0" y="820" width="1440" height="80" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
  <text x="100" y="865" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#475569">SentiNest [Footer Logo Placeholder]</text>
  <text x="640" y="865" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#64748b">[Links: Home - Classifier - About - Settings]</text>
  <text x="1140" y="865" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">© [2026] Trishul Eco-Homestays SentiNest</text>
</svg>
