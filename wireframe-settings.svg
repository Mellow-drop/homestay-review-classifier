<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900">
  <!-- Grayscale Background -->
  <rect width="100%" height="100%" fill="#f8fafc" />
  
  <!-- WIREFRAME NAVBAR -->
  <rect x="0" y="0" width="1440" height="70" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
  <rect x="60" y="15" width="40" height="40" rx="8" fill="#e2e8f0" stroke="#94a3b8" />
  <text x="73" y="40" font-family="system-ui, sans-serif" font-size="16" font-weight="900" fill="#475569">[L]</text>
  <text x="120" y="38" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#334155">SentiNest [Branding]</text>
  <text x="120" y="52" font-family="system-ui, sans-serif" font-size="10" font-weight="semibold" fill="#64748b">[Trishul Homestays]</text>
  
  <!-- Navbar links -->
  <text x="480" y="42" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#64748b">[Link: Home]</text>
  <text x="580" y="42" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#64748b">[Link: Classifier]</text>
  <text x="720" y="42" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#64748b">[Link: About]</text>
  <text x="840" y="42" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#64748b">[Link: Dashboard]</text>
  <text x="1000" y="42" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#64748b">[Link: Login]</text>
  
  <rect x="1240" y="18" width="140" height="34" rx="8" fill="#e2e8f0" stroke="#cbd5e1" />
  <text x="1275" y="39" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#475569">[Staff Portal]</text>
  
  <!-- PAGE TITLE -->
  <text x="100" y="130" font-family="system-ui, sans-serif" font-size="28" font-weight="900" fill="#334155">System Settings [Screen]</text>
  <text x="100" y="155" font-family="system-ui, sans-serif" font-size="14" fill="#64748b">[Configure model fallback behaviors, interface preferences, and API endpoints]</text>

  <!-- SETTINGS FORM CARD -->
  <rect x="100" y="190" width="1240" height="580" rx="20" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
  
  <!-- Settings Section 1: General Preferences -->
  <text x="140" y="240" font-family="system-ui, sans-serif" font-size="16" font-weight="extrabold" fill="#334155">[General System Settings]</text>
  <line x1="140" y1="250" x2="1300" y2="250" stroke="#cbd5e1" />

  <!-- Setting 1.1: Local Fallback database -->
  <text x="140" y="285" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#475569">[Setting: Enable Offline Local Heuristics Fallback]</text>
  <text x="140" y="302" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">[Automatically route review classifications to keyword parsing rules when Gemini API limits expire]</text>
  <rect x="1240" y="278" width="48" height="24" rx="12" fill="#cbd5e1" stroke="#94a3b8" />
  <circle cx="1252" cy="290" r="8" fill="#ffffff" />

  <!-- Setting 1.2: Auto Copy Suggested Response -->
  <text x="140" y="355" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#475569">[Setting: Auto-Copy Management Replies to Clipboard]</text>
  <text x="140" y="372" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">[Copy drafted management responses instantly to system clipboard upon classification completes]</text>
  <rect x="1240" y="348" width="48" height="24" rx="12" fill="#334155" stroke="#1e293b" />
  <circle cx="1276" cy="360" r="8" fill="#ffffff" />

  <!-- Settings Section 2: LLM Configuration -->
  <text x="140" y="440" font-family="system-ui, sans-serif" font-size="16" font-weight="extrabold" fill="#334155">[Gemini API Configuration]</text>
  <line x1="140" y1="450" x2="1300" y2="450" stroke="#cbd5e1" />

  <!-- Setting 2.1: Model version selection -->
  <text x="140" y="485" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#475569">[SELECT TARGET LLM ENGINE MODEL]</text>
  <rect x="140" y="500" width="1160" height="44" rx="10" fill="#f8fafc" stroke="#cbd5e1" />
  <text x="160" y="527" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#334155">gemini-3.5-flash [Current Model Selection]</text>
  <text x="1145" y="527" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#64748b">[Select Dropdown Icon]</text>

  <!-- Setting 2.2: Temperature slider placeholder -->
  <text x="140" y="585" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#475569">[MODEL GENERATION TEMPERATURE SLIDER (CREATIVITY)]</text>
  <!-- Slider Track -->
  <rect x="140" y="605" width="1160" height="6" rx="3" fill="#cbd5e1" />
  <!-- Active segment -->
  <rect x="140" y="605" width="420" height="6" rx="3" fill="#334155" />
  <!-- Slider Handle -->
  <circle cx="560" cy="608" r="10" fill="#334155" stroke="#ffffff" stroke-width="2" />
  <text x="560" y="635" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#475569">[Value: 0.35]</text>

  <!-- Save button -->
  <rect x="140" y="685" width="220" height="48" rx="12" fill="#334155" stroke="#1e293b" />
  <text x="250" y="714" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">[Button: Save System Config]</text>

  <!-- WIREFRAME FOOTER -->
  <rect x="0" y="820" width="1440" height="80" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
  <text x="100" y="865" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#475569">SentiNest [Footer Logo Placeholder]</text>
  <text x="640" y="865" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#64748b">[Links: Home - Classifier - About - Settings]</text>
  <text x="1140" y="865" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">© [2026] Trishul Eco-Homestays SentiNest</text>
</svg>
